<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OMNICORE V10 | AI</title>
    <style>
        body { background: #000; color: #00d4ff; font-family: monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #header { padding: 15px; border-bottom: 2px solid #00d4ff; text-align: center; background: #050505; font-weight: bold; box-shadow: 0 0 15px #00d4ff; }
        #chat { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; }
        .msg { padding: 12px; border-radius: 10px; max-width: 85%; line-height: 1.5; font-size: 15px; border: 1px solid; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .user { background: rgba(0, 212, 255, 0.15); border-color: #00d4ff; align-self: flex-end; color: #fff; border-bottom-right-radius: 2px; }
        .ai { background: rgba(0, 255, 150, 0.1); border-color: #00ff96; align-self: flex-start; color: #00ff96; border-bottom-left-radius: 2px; }
        #input-area { padding: 15px; background: #0a0a0a; border-top: 2px solid #00d4ff; display: flex; gap: 8px; padding-bottom: 35px; }
        input { flex: 1; padding: 12px; background: #000; border: 1px solid #00d4ff; color: #fff; border-radius: 8px; outline: none; font-size: 16px; }
        button { padding: 12px 18px; background: #00d4ff; color: #000; border: none; border-radius: 8px; font-weight: bold; transition: 0.3s; }
        button:active { transform: scale(0.9); background: #00ff96; }
    </style>
</head>
<body>
    <div id="header">OMNICORE V10 <br><small style="font-size: 10px; color: #00ff96;">AI BRAIN: ONLINE</small></div>
    <div id="chat"></div>
    <div id="input-area">
        <input type="text" id="mesaj" placeholder="Bir şey yazın..." autocomplete="off">
        <button onclick="sor()">GÖNDER</button>
    </div>

    <script>
        // BURAYA KENDİ API ANAHTARINI YAPIŞTIR
        const API_KEY = "AIzaSyAHI6PwSq4DJuKCwSfKbsJDw6WTwH4LA5o";

        async function sor() {
            let kutu = document.getElementById("mesaj");
            let metin = kutu.value.trim();
            if(!metin) return;

            ekle("user", metin);
            kutu.value = "";
            kutu.placeholder = "Core düşünüyor...";
            kutu.disabled = true;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: metin }] }] })
                });

                const data = await response.json();
                const aiCevap = data.candidates[0].content.parts[0].text;
                ekle("ai", aiCevap);
            } catch (error) {
                ekle("ai", "HATA: Bağlantı kurulamadı. Lütfen API anahtarını kontrol et!");
            }
            
            kutu.placeholder = "Bir şey yazın...";
            kutu.disabled = false;
            kutu.focus();
        }

        function ekle(tip, metin) {
            let chat = document.getElementById("chat");
            let div = document.createElement("div");
            div.className = "msg " + tip;
            div.innerHTML = "<b>" + (tip === "user" ? "SEN" : "CORE") + ":</b> " + metin;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
