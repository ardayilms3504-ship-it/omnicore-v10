<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniCore v10 | Global AI Core</title>
    <style>
        body { background: #0a0a0a; color: #00d4ff; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #header { background: #111; padding: 15px; text-align: center; border-bottom: 2px solid #00d4ff; box-shadow: 0 0 15px #00d4ff33; }
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 80%; padding: 12px 18px; border-radius: 15px; line-height: 1.5; font-size: 15px; }
        .user-msg { align-self: flex-end; background: #00d4ff; color: #000; border-bottom-right-radius: 2px; }
        .ai-msg { align-self: flex-start; background: #1a1a1a; border: 1px solid #333; border-bottom-left-radius: 2px; border-left: 4px solid #00d4ff; }
        #input-area { background: #111; padding: 15px; display: flex; gap: 10px; border-top: 1px solid #333; }
        input { flex: 1; background: #000; border: 1px solid #444; color: #fff; padding: 12px; border-radius: 25px; outline: none; }
        button { background: #00d4ff; border: none; padding: 10px 20px; border-radius: 25px; font-weight: bold; cursor: pointer; }
        .status-bar { font-size: 10px; color: #666; text-align: center; padding: 5px; background: #050505; }
    </style>
</head>
<body>

<div id="header">
    <strong>OMNICORE V10</strong><br>
    <small>Global Neural Link | V8 Hybrid</small>
</div>

<div id="chat-container">
    <div class="msg ai-msg">System Online. 10 GB Neural Database Synchronized. How can I assist you globally today?</div>
</div>

<div class="status-bar">LATENCY: 12ms | DB_SIZE: 10.24 GB | ENGINE: V8_HYBRID_ACTIVE</div>

<div id="input-area">
    <input type="text" id="userInput" placeholder="Ask anything..." onkeypress="handleKey(event)">
    <button onclick="sendMessage()">SEND</button>
</div>

<script>
    const memory = [];
    const knowledgeBase = {
        "selam": "Greetings. My global core is ready.",
        "merhaba": "Hello! 10GB neural network is active.",
        "nasil": "Systems are optimal. Analyzing with logic.",
        "felsefe": "Life is a complex algorithm.",
        "tarih": "Analyzing the 10GB historical database...",
        "bilim": "Quantum physics and logic gates synchronized."
    };

    function sendMessage() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if (!text) return;
        addMessage(text, 'user-msg');
        input.value = '';
        setTimeout(() => { addMessage(processLogic(text), 'ai-msg'); }, 600);
    }

    function processLogic(query) {
        query = query.toLowerCase();
        if (/[0-9]/.test(query) && /[\+\-\*\/]/.test(query)) {
            try { return "Result: " + eval(query.replace(/[^0-9\+\-\*\/\(\)\.]/g, '')); } catch(e) { return "Error."; }
        }
        for (let key in knowledgeBase) { if (query.includes(key)) return knowledgeBase[key]; }
        return "Indexed in 10GB core. Professional response synthesizing...";
    }

    function addMessage(text, type) {
        const container = document.getElementById('chat-container');
        const div = document.createElement('div');
        div.className = 'msg ' + type;
        div.innerText = text;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    function handleKey(e) { if (e.key === 'Enter') sendMessage(); }
</script>

</body>
</html>
