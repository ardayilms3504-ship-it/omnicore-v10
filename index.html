<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OMNICORE V10</title>
    <style>
        body { background: #000; color: #00d4ff; font-family: monospace; margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; }
        #header { padding: 15px; border-bottom: 2px solid #00d4ff; text-align: center; background: #0a0a0a; }
        #chat-container { flex: 1; overflow-y: auto; padding: 15px; background: #000; }
        .msg { background: rgba(0, 212, 255, 0.1); border: 1px solid #00d4ff; padding: 10px; margin-bottom: 10px; border-radius: 5px; }
        
        /* ÖNEMLİ: Yazma alanını yukarı taşıdık */
        #input-area { 
            padding: 20px; 
            background: #111; 
            border-top: 2px solid #00d4ff; 
            display: flex; 
            gap: 10px;
            padding-bottom: 40px; /* Telefon butonlarından kurtulmak için mesafe */
        }
        input { flex: 1; padding: 12px; background: #000; border: 1px solid #00d4ff; color: #fff; border-radius: 5px; font-size: 16px; }
        button { padding: 12px 20px; background: #00d4ff; color: #000; border: none; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="header">
        <strong>OMNICORE V10</strong><br>
        <small>Global Neural Link | V8 Hybrid</small>
    </div>
    <div id="chat-container" id="display">
        <div class="msg">System Online. Bekleniyor...</div>
    </div>
    <div id="input-area">
        <input type="text" id="mesaj" placeholder="Buraya dokun ve yaz..." autocomplete="off">
        <button onclick="gonder()">GÖNDER</button>
    </div>

    <script>
        function gonder() {
            let kutu = document.getElementById("mesaj");
            let ekran = document.getElementById("chat-container");
            if(kutu.value !== "") {
                let yeni = document.createElement("div");
                yeni.className = "msg";
                yeni.innerHTML = "<b>USER:</b> " + kutu.value;
                ekran.appendChild(yeni);
                kutu.value = "";
                ekran.scrollTop = ekran.scrollHeight;
            }
        }
    </script>
</body>
</html>
