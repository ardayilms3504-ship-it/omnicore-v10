
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>OMNICORE V10 | AI</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', Courier, monospace; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; border-bottom: 2px solid #0f0; background: #050505; }
        .input-area { padding: 20px; display: flex; background: #000; }
        input { flex: 1; background: #000; border: 1px solid #0f0; color: #0f0; padding: 15px; outline: none; }
        button { background: #0f0; color: #000; border: none; padding: 10px 25px; cursor: pointer; margin-left: 10px; font-weight: bold; }
        .msg { margin-bottom: 15px; line-height: 1.5; }
        .user { color: #fff; }
        .ai { color: #0f0; }
    </style>
</head>
<body>
    <div id="chat">--- OMNICORE V10 SISTEM BASLATILDI ---<br>VPN: Aktif (Önerilir)<br><br></div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Mesajınızı yazın..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()">GÖNDER</button>
    </div>

    <script>
        // Senin yeni verdiğin anahtarı buraya gömdüm:
        const API_KEY = "AIzaSyCPU_j4ic5XaWbGhE98obZ6IhfUx4kwXA4";

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const chat = document.getElementById('chat');
            if (!input.value.trim()) return;

            const userText = input.value;
            chat.innerHTML += `<div class="msg user"><b>SİZ:</b> ${userText}</div>`;
            input.value = "";

            try {
                // En güncel Gemini 1.5 Flash bağlantısı
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: userText }] }] })
                });

                const data = await response.json();
                
                if (data.candidates && data.candidates[0].content.parts[0].text) {
                    const aiResponse = data.candidates[0].content.parts[0].text;
                    chat.innerHTML += `<div class="msg ai"><b>OMNICORE:</b> ${aiResponse}</div>`;
                } else {
                    chat.innerHTML += `<div style="color:red">HATA: Google anahtarı henüz aktif değil veya limit doldu. Lütfen 5 dk sonra VPN ile deneyin.</div>`;
                }
            } catch (error) {
                chat.innerHTML += `<div style="color:red">HATA: Bağlantı kurulamadı. VPN'i kontrol edin.</div>`;
            }
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
