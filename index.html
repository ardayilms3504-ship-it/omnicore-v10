<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    
    <title>OMNICORE V10 | ARCHITECT ARDA</title>
    
    <style>
        /* ANA SİSTEM TASARIMI */
        body { 
            touch-action: manipulation; /* TIKLAMA GECİKMESİNİ SİLER */
            background: #000; 
            color: #0f0; 
            font-family: 'Courier New', Courier, monospace; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden; 
        }

        /* AÇILIŞ EKRANI (SPLASH SCREEN) */
        #splash { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 9999; 
            transition: opacity 0.8s ease; 
        }
        .splash-logo { width: 180px; filter: drop-shadow(0 0 15px #0f0); animation: pulse 2s infinite; }
        .loader-text { margin-top: 20px; font-size: 10px; letter-spacing: 4px; color: #0f0; opacity: 0.7; }

        /* ARAYÜZ PARÇALARI */
        .header { padding: 15px; text-align: center; border-bottom: 1px solid #111; background: #050505; }
        .logo-small { width: 110px; filter: drop-shadow(0 0 5px #0f0); }
        .dev-info { font-size: 9px; color: #444; letter-spacing: 2px; margin-top: 5px; }

        #chat { flex: 1; overflow-y: auto; padding: 20px; background: #020202; scroll-behavior: smooth; }
        .input-area { 
            padding: 15px; display: flex; background: #000; border-top: 1px solid #222; 
            padding-bottom: calc(15px + env(safe-area-inset-bottom)); 
        }
        
        input { flex: 1; background: #0a0a0a; border: 1px solid #0f0; color: #0f0; padding: 12px; outline: none; font-family: inherit; font-size: 16px; border-radius: 5px; }
        button { background: #0f0; color: #000; border: none; padding: 0 20px; cursor: pointer; margin-left: 10px; font-weight: bold; border-radius: 5px; transition: 0.2s; }
        button:active { transform: scale(0.95); opacity: 0.8; }

        /* MESAJ STİLLERİ */
        .msg { margin-bottom: 20px; line-height: 1.5; font-size: 14px; }
        .user { color: #fff; border-bottom: 1px solid #111; padding-bottom: 8px; opacity: 0.9; }
        .ai { color: #0f0; border-left: 3px solid #0f0; padding-left: 15px; white-space: pre-wrap; }
        .status { color: #333; font-size: 11px; margin-bottom: 5px; }

        @keyframes pulse { 0% { opacity: 0.4; transform: scale(0.95); } 50% { opacity: 1; transform: scale(1); } 100% { opacity: 0.4; transform: scale(0.95); } }
        
        #chat::-webkit-scrollbar { width: 2px; }
        #chat::-webkit-scrollbar-thumb { background: #0f0; }
    </style>
</head>
<body>

    <div id="splash">
        <img src="omnicore-logo.png" class="splash-logo" alt="OMNICORE">
        <div class="loader-text">CONNECTING TO OMNICORE V10...</div>
    </div>

    <div class="header">
        <img src="omnicore-logo.png" alt="OMNICORE V10" class="logo-small">
        <div class="dev-info">SYSTEM ARCHITECT: ARDA</div>
    </div>

    <div id="chat">
        <div class="status">>> SYSTEM VERSION: 10.0.4 GLOBAL</div>
        <div class="status">>> WELCOME BACK, ARCHITECT ARDA.</div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Sisteme komut ver..." autofocus onkeypress="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()">GÖNDER</button>
    </div>

    <script>
        const s1 = "gsk_D65TS2b8C6I";
        const s2 = "ILUUanBCmWGdyb3";
        const s3 = "FYHH5LlSglkTC";
        const s4 = "29Be3emGVsUaq";
        const KEY = s1 + s2 + s3 + s4;

        // AÇILIŞ EKRANI KONTROLÜ
        window.addEventListener('load', () => {
            setTimeout(() => {
                const splash = document.getElementById('splash');
                splash.style.opacity = '0';
                setTimeout(() => splash.style.display = 'none', 800);
            }, 2000); // 2 saniye sonra kapanır

            // HAFIZADAN ESKİ KONUŞMALARI GETİR
            const savedChat = localStorage.getItem('omnicore_history');
            if(savedChat) document.getElementById('chat').innerHTML += savedChat;
        });

        let queue = ""; 
        let isProcessing = false;

        // İNSANSI YAZMA EFEKTİ (HIZ AYARI BURADA)
        async function processQueue(element) {
            if (queue.length > 0) {
                isProcessing = true;
                element.innerHTML += queue.charAt(0);
                queue = queue.substring(1);
                document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
                
                // HER HARFTE HAFIZAYA KAYDET
                localStorage.setItem('omnicore_history', document.getElementById('chat').innerHTML);
                
                setTimeout(() => processQueue(element), 15); // 15ms hızı
            } else {
                isProcessing = false;
            }
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const chat = document.getElementById('chat');
            const text = input.value.trim();
            if (!text) return;

            // TEMİZLEME KOMUTU
            if(text.toLowerCase() === "clear") {
                localStorage.removeItem('omnicore_history');
                location.reload();
                return;
            }

            chat.innerHTML += `<div class="msg user"><b>SİZ ></b> ${text}</div>`;
            input.value = "";

            const aiMsgDiv = document.createElement("div");
            aiMsgDiv.className = "msg ai";
            aiMsgDiv.innerHTML = "<b>OMNICORE ></b> <span class='content'></span>";
            chat.appendChild(aiMsgDiv);
            const contentSpan = aiMsgDiv.querySelector('.content');

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${KEY}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [
                            { role: "system", content: "Sen OMNICORE V10'sun. Kurucun Arda. Sen zeki, profesyonel bir terminal yapay zekasısın. Hafızan var, geçmişi hatırlarsın." },
                            { role: "user", content: text }
                        ],
                        stream: true 
                    })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value, { stream: true });
                    const lines = chunk.split('\n');

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const dataStr = line.replace('data: ', '').trim();
                            if (dataStr === '[DONE]') break;
                            try {
                                const json = JSON.parse(dataStr);
                                const token = json.choices[0].delta.content;
                                if (token) {
                                    queue += token;
                                    if (!isProcessing) processQueue(contentSpan);
                                }
                            } catch (e) {}
                        }
                    }
                }
            } catch (e) {
                contentSpan.innerHTML = "!! BAĞLANTI HATASI !!";
            }
        }
    </script>
</body>
</html>
