<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMNICORE V10 | GROQ SPEED</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', Courier, monospace; display: flex; flex-direction: column; height: 100vh; margin: 0; overflow: hidden; }
        
        /* Logo ve Header */
        .header { padding: 15px; text-align: center; border-bottom: 1px solid #111; background: #050505; }
        .logo { width: 150px; height: auto; filter: drop-shadow(0 0 5px #0f0); margin-bottom: 5px; }
        .dev-info { font-size: 11px; color: #444; letter-spacing: 2px; }

        /* Chat Alanı */
        #chat { flex: 1; overflow-y: auto; padding: 20px; background: #020202; scroll-behavior: smooth; }
        .input-area { padding: 20px; display: flex; background: #000; border-top: 1px solid #222; }
        
        input { flex: 1; background: #0a0a0a; border: 1px solid #0f0; color: #0f0; padding: 15px; outline: none; font-family: inherit; font-size: 16px; }
        button { background: #0f0; color: #000; border: none; padding: 0 30px; cursor: pointer; margin-left: 10px; font-weight: bold; transition: 0.3s; }
        button:hover { background: #fff; box-shadow: 0 0 10px #fff; }

        /* Mesaj Stilleri */
        .msg { margin-bottom: 20px; line-height: 1.6; word-wrap: break-word; }
        .user { color: #fff; border-bottom: 1px solid #111; padding-bottom: 10px; }
        .ai { color: #0f0; border-left: 3px solid #0f0; padding-left: 15px; white-space: pre-wrap; }
        .status { color: #333; font-size: 0.8em; margin-bottom: 10px; border-left: 1px solid #222; padding-left: 5px; }

        /* Scrollbar Tasarımı */
        #chat::-webkit-scrollbar { width: 5px; }
        #chat::-webkit-scrollbar-thumb { background: #0f0; }
    </style>
</head>
<body>

    <div class="header">
        <img src="omnicore-logo.png" alt="OMNICORE V10" class="logo">
        <div class="dev-info">SYSTEM ARCHITECT: ARDA</div>
    </div>

    <div id="chat">
        <div class="status">>> OMNICORE V10 SİSTEMİ ÇEVRİMİÇİ</div>
        <div class="status">>> YETKİLİ GİRİŞİ: ARDA ONAYLANDI</div>
        <div class="status">>> STREAMING MODU: AKTİF</div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Sisteme komut verin..." autofocus onkeypress="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()">GÖNDER</button>
    </div>

    <script>
        // API Anahtarı Parçaları
        const s1 = "gsk_D65TS2b8C6I";
        const s2 = "ILUUanBCmWGdyb3";
        const s3 = "FYHH5LlSglkTC";
        const s4 = "29Be3emGVsUaq";
        const KEY = s1 + s2 + s3 + s4;

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const chat = document.getElementById('chat');
            const text = input.value.trim();
            if (!text) return;

            // Kullanıcı mesajını ekle
            chat.innerHTML += `<div class="msg user"><b>SİZ ></b> ${text}</div>`;
            input.value = "";

            // AI mesaj kutusunu hazırla (Streaming burada başlayacak)
            const aiMsgDiv = document.createElement("div");
            aiMsgDiv.className = "msg ai";
            aiMsgDiv.innerHTML = "<b>OMNICORE ></b> <span class='content'></span>";
            chat.appendChild(aiMsgDiv);
            const contentSpan = aiMsgDiv.querySelector('.content');

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [
                            { role: "system", content: "Adın OMNICORE V10. Kurucun ve yapımcın Arda. Sen çok zeki, profesyonel ve terminal tabanlı bir yapay zekasın. Arda hakkında sorular gelirse onun kurucu olduğunu belirt." },
                            { role: "user", content: text }
                        ],
                        stream: true // CANLI AKIŞ MODU
                    })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value, { stream: true });
                    const lines = chunk.split('\n');

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const dataStr = line.replace('data: ', '').trim();
                            if (dataStr === '[DONE]') break;

                            try {
                                const json = JSON.parse(dataStr);
                                const token = json.choices[0].delta.content;
                                if (token) {
                                    contentSpan.innerHTML += token; // Kelime geldikçe yaz
                                    chat.scrollTop = chat.scrollHeight; // Ekranı aşağı kaydır
                                }
                            } catch (e) {}
                        }
                    }
                }
            } catch (e) {
                contentSpan.innerHTML = "KRİTİK HATA: Veri akışı kesildi.";
            }
        }
    </script>
</body>
</html>
