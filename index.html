<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMNICORE V10 | GROQ SPEED</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', Courier, monospace; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; background: #050505; border: 1px solid #111; }
        .input-area { padding: 20px; display: flex; background: #000; border-top: 1px solid #222; }
        input { flex: 1; background: #111; border: 1px solid #0f0; color: #0f0; padding: 15px; outline: none; }
        button { background: #0f0; color: #000; border: none; padding: 0 25px; cursor: pointer; margin-left: 10px; font-weight: bold; }
        .msg { margin-bottom: 15px; line-height: 1.5; }
        .user { color: #fff; }
        .ai { color: #0f0; border-left: 3px solid #0f0; padding-left: 10px; }
        .status { color: #555; font-size: 0.8em; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div id="chat">
        <div class="status">--- OMNICORE V10 GROQ SİSTEMİ ÇEVRİMİÇİ ---</div>
    </div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Sisteme komut verin..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()">İLET</button>
    </div>

    <script>
        // Anahtarı 4 parçaya bölerek GitHub'dan gizliyoruz
        const s1 = "gsk_D65TS2b8C6I";
        const s2 = "ILUUanBCmWGdyb3";
        const s3 = "FYHH5LlSglkTC";
        const s4 = "29Be3emGVsUaq";
        
        const KEY = s1 + s2 + s3 + s4;

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const chat = document.getElementById('chat');
            if (!input.value.trim()) return;

            const userText = input.value;
            chat.innerHTML += `<div class="msg user"><b>SİZ ></b> ${userText}</div>`;
            input.value = "";

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [{ role: "user", content: userText }]
                    })
                });

                const data = await response.json();
                if (data.choices && data.choices[0].message) {
                    const aiResponse = data.choices[0].message.content;
                    chat.innerHTML += `<div class="msg ai"><b>OMNICORE ></b> ${aiResponse}</div>`;
                } else {
                    chat.innerHTML += `<div style="color:orange">SİSTEM: Erişim reddedildi veya kota doldu.</div>`;
                }
            } catch (e) {
                chat.innerHTML += `<div style="color:red">SİSTEM: Bağlantı hatası.</div>`;
            }
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
