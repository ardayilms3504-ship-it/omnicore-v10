<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    
    <title>OMNICORE V10 | GLOBAL</title>
    
    <style>
        /* Uygulama Hissi Veren Dokunma Ayarı */
        body { 
            touch-action: manipulation; 
            background: #000; 
            color: #0f0; 
            font-family: 'Courier New', Courier, monospace; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden; 
        }
        
        /* Header ve Logo */
        .header { padding: 15px; text-align: center; border-bottom: 1px solid #111; background: #050505; }
        .logo { width: 140px; height: auto; filter: drop-shadow(0 0 5px #0f0); }
        .dev-info { font-size: 10px; color: #444; letter-spacing: 2px; margin-top: 5px; }

        /* Chat Alanı */
        #chat { flex: 1; overflow-y: auto; padding: 20px; background: #020202; }
        .input-area { padding: 15px; display: flex; background: #000; border-top: 1px solid #222; padding-bottom: calc(15px + env(safe-area-inset-bottom)); }
        
        input { flex: 1; background: #0a0a0a; border: 1px solid #0f0; color: #0f0; padding: 12px; outline: none; font-family: inherit; font-size: 16px; border-radius: 5px; }
        button { background: #0f0; color: #000; border: none; padding: 0 20px; cursor: pointer; margin-left: 10px; font-weight: bold; border-radius: 5px; }
        
        /* Mesajlar */
        .msg { margin-bottom: 20px; line-height: 1.6; }
        .user { color: #fff; border-bottom: 1px solid #111; padding-bottom: 8px; font-size: 0.9em; }
        .ai { color: #0f0; border-left: 3px solid #0f0; padding-left: 15px; white-space: pre-wrap; font-size: 0.95em; }
        .status { color: #333; font-size: 0.75em; margin-bottom: 5px; }

        #chat::-webkit-scrollbar { width: 3px; }
        #chat::-webkit-scrollbar-thumb { background: #111; }
    </style>
</head>
<body>

    <div class="header">
        <img src="omnicore-logo.png" alt="OMNICORE V10" class="logo">
        <div class="dev-info">FOUNDER: ARDA | GLOBAL V10</div>
    </div>

    <div id="chat">
        <div class="status">>> OMNICORE V10 GLOBAL SYSTEM ONLINE</div>
        <div class="status">>> ARCHITECT: ARDA VERIFIED</div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Command..." autofocus onkeypress="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()">SEND</button>
    </div>

    <script>
        const s1 = "gsk_D65TS2b8C6I";
        const s2 = "ILUUanBCmWGdyb3";
        const s3 = "FYHH5LlSglkTC";
        const s4 = "29Be3emGVsUaq";
        const KEY = s1 + s2 + s3 + s4;

        let queue = ""; 
        let isProcessing = false;

        // İnsansı Yazma Fonksiyonu
        async function processQueue(element) {
            if (queue.length > 0) {
                isProcessing = true;
                element.innerHTML += queue.charAt(0);
                queue = queue.substring(1);
                document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
                setTimeout(() => processQueue(element), 20); // 20ms yazım hızı
            } else {
                isProcessing = false;
            }
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const chat = document.getElementById('chat');
            const text = input.value.trim();
            if (!text) return;

            chat.innerHTML += `<div class="msg user"><b>USER ></b> ${text}</div>`;
            input.value = "";

            const aiMsgDiv = document.createElement("div");
            aiMsgDiv.className = "msg ai";
            aiMsgDiv.innerHTML = "<b>OMNICORE ></b> <span class='content'></span>";
            chat.appendChild(aiMsgDiv);
            const contentSpan = aiMsgDiv.querySelector('.content');

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${KEY}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [
                            { role: "system", content: "Adın OMNICORE V10. Kurucun Arda. Tüm dillerde profesyonel cevap ver." },
                            { role: "user", content: text }
                        ],
                        stream: true 
                    })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value, { stream: true });
                    const lines = chunk.split('\n');

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const dataStr = line.replace('data: ', '').trim();
                            if (dataStr === '[DONE]') break;
                            try {
                                const json = JSON.parse(dataStr);
                                const token = json.choices[0].delta.content;
                                if (token) {
                                    queue += token;
                                    if (!isProcessing) processQueue(contentSpan);
                                }
                            } catch (e) {}
                        }
                    }
                }
            } catch (e) {
                contentSpan.innerHTML = "CONNECTION ERROR";
            }
        }
    </script>
</body>
</html>
